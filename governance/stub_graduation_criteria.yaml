# ============================================================================
# STUB GRADUATION CRITERIA v1.0.0
# ============================================================================
# Defines requirements for promoting stub modules to production-ready status.
# Each stub must either GRADUATE (Option A) or be DENIED (Option B).
# No stub may remain in "success-returning placeholder" state.
#
# STATUS: ACTIVE
# CREATED: 2025-12-21
# ============================================================================

version: "1.0.0"

# ============================================================================
# GRADUATION OPTIONS
# ============================================================================
options:
  option_a_implement:
    name: "Implement Real Semantics"
    description: "Add minimal, correct logic with invariants and tests"
    requirements:
      - id: "impl_complete"
        description: "Core business logic implemented"
        verification: "code_review"
      - id: "invariants_defined"
        description: "Module-specific invariants defined and enforced"
        verification: "invariant_engine_check"
      - id: "tests_passing"
        description: "Unit tests with >80% coverage"
        verification: "pytest_coverage"
      - id: "error_handling"
        description: "Proper error handling, no silent failures"
        verification: "code_review"
      - id: "stub_flag_removed"
        description: "_IS_STUB = False"
        verification: "automated_check"
      - id: "governance_review"
        description: "Governance review passed"
        verification: "human_approval"
    outcome: "Module becomes production capability"
    
  option_b_deny:
    name: "Downgrade to Denied Capability"
    description: "Explicitly block via governance, return 501/403"
    requirements:
      - id: "return_501"
        description: "All methods return 501 NOT_IMPLEMENTED or 403 FORBIDDEN"
        verification: "automated_check"
      - id: "governance_block"
        description: "Capability blocked in capability_grammar.yaml"
        verification: "grammar_check"
      - id: "stub_flag_kept"
        description: "_IS_STUB = True (permanent)"
        verification: "automated_check"
      - id: "documentation"
        description: "Reason for denial documented"
        verification: "doc_check"
    outcome: "Module becomes explicit non-capability"

# ============================================================================
# STUB MODULE REGISTRY WITH RECOMMENDED FATE
# ============================================================================
stubs:
  # --------------------------------------------------------------------------
  # CHAT SERVICE STUBS
  # --------------------------------------------------------------------------
  - module: "chat_service/app/services/agent_router.py"
    classes: ["AgentRouter"]
    priority: "high"
    recommended_fate: "option_a_implement"
    rationale: "Core routing logic needed for multi-agent chat"
    graduation_blockers: []
    estimated_effort: "2-3 days"
    
  - module: "chat_service/app/services/self_improving_agent.py"
    classes: ["SelfImprovingAgent"]
    priority: "medium"
    recommended_fate: "option_b_deny"
    rationale: "Self-improvement requires careful governance design first"
    graduation_blockers:
      - "No governance framework for self-modification"
      - "Risk of unbounded behavior"
    estimated_effort: "N/A - deny for now"
    
  - module: "chat_service/app/services/autonomous_planner.py"
    classes: ["AutonomousPlanner"]
    priority: "medium"
    recommended_fate: "option_a_implement"
    rationale: "Task planning is core capability"
    graduation_blockers: []
    estimated_effort: "2-3 days"

  # --------------------------------------------------------------------------
  # AGENT ENGINE SERVICE STUBS
  # --------------------------------------------------------------------------
  - module: "agent_engine_service/app/parallel_agent_runtime.py"
    classes: ["ParallelAgentRuntime"]
    priority: "high"
    recommended_fate: "option_a_implement"
    rationale: "Core runtime for agent execution"
    graduation_blockers: []
    estimated_effort: "3-4 days"
    
  - module: "agent_engine_service/app/agent_collaboration.py"
    classes: ["CollaborationHub"]
    priority: "high"
    recommended_fate: "option_a_implement"
    rationale: "Multi-agent collaboration is core feature"
    graduation_blockers: []
    estimated_effort: "2-3 days"
    
  - module: "agent_engine_service/app/proactive_behavior.py"
    classes: ["ProactiveBehaviorSystem"]
    priority: "medium"
    recommended_fate: "option_b_deny"
    rationale: "Proactive behavior requires careful governance"
    graduation_blockers:
      - "No initiative level governance"
      - "Risk of unwanted autonomous actions"
    estimated_effort: "N/A - deny for now"
    
  - module: "agent_engine_service/app/agent_personality.py"
    classes: ["PersonalityManager"]
    priority: "low"
    recommended_fate: "option_a_implement"
    rationale: "Low risk, useful for UX"
    graduation_blockers: []
    estimated_effort: "1 day"
    
  - module: "agent_engine_service/app/agent_consciousness.py"
    classes: ["ConsciousnessManager"]
    priority: "low"
    recommended_fate: "option_b_deny"
    rationale: "Consciousness semantics undefined, high risk of false authority"
    graduation_blockers:
      - "No clear semantic definition"
      - "Risk of anthropomorphization"
    estimated_effort: "N/A - deny"
    
  - module: "agent_engine_service/app/agent_brain.py"
    classes: ["AgentBrain", "BrainManager"]
    priority: "medium"
    recommended_fate: "option_a_implement"
