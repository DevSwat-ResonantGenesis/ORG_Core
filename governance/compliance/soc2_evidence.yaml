# ============================================================================
# CC6 - LOGICAL AND PHYSICAL ACCESS CONTROLS
# ============================================================================
cc6:
  title: "Logical and Physical Access Controls"
  status: "COMPLIANT"
  
  criteria:
    - id: "CC6.1"
      criterion: "The entity implements logical access security software"
      evidence:
        - artifact: "governance/capability_grammar.yaml"
          description: "15 capabilities with explicit allow/deny rules"
          control_type: "Preventive"
        - artifact: "rara_service/app/capability_enforcer.py"
          description: "Runtime enforcement of capability grammar"
          control_type: "Preventive"
        - artifact: "auth_service"
          description: "Authentication and authorization service"
          control_type: "Preventive"
      test_procedures:
        - "Verify capability grammar is loaded at service startup"
        - "Attempt unauthorized capability - confirm rejection"
        - "Review capability enforcer logs for denial events"
      compliance_notes: "Capability grammar = access policy, enforced at runtime"
      
    - id: "CC6.2"
      criterion: "Prior to issuing system credentials, the entity registers authorized users"
      evidence:
        - artifact: "auth_service/app/main.py"
          description: "User registration with email verification"
        - artifact: "contracts/api_contracts.json#/auth/register"
          description: "Registration contract with required fields"
      test_procedures:
        - "Verify registration requires email, password, username"
        - "Confirm duplicate email rejection"
      compliance_notes: "Registration enforced via API contract"
      
    - id: "CC6.3"
      criterion: "The entity authorizes, modifies, or removes access based on roles"
      evidence:
        - artifact: "governance/capability_grammar.yaml#risk_levels"
          description: "Role-based capability restrictions"
        - artifact: "governance/capability_grammar.yaml#environments"
          description: "Environment-specific access controls"
      test_procedures:
        - "Verify dev vs prod capability differences"
        - "Confirm critical actions require elevated approval"
      compliance_notes: "Environment-based access control with escalation"
      
    - id: "CC6.6"
      criterion: "The entity implements controls to prevent unauthorized access"
      evidence:
        - artifact: "governance/federation/treaty_validator.py"
          description: "Treaty-based cross-system access control"
        - artifact: "governance/capability_grammar.yaml#denied_paths"
          description: "Explicit path denials"
      test_procedures:
        - "Attempt cross-droplet request without treaty - confirm rejection"
        - "Attempt access to denied path - confirm rejection"
      compliance_notes: "No transitive trust, explicit denials enforced"

# ============================================================================
# CC7 - SYSTEM OPERATIONS
# ============================================================================
cc7:
  title: "System Operations"
  status: "COMPLIANT"
  
  criteria:
    - id: "CC7.1"
      criterion: "The entity uses detection and monitoring procedures"
      evidence:
        - artifact: "code_visualizer_service"
          description: "Real-time code structure analysis"
        - artifact: "rara_service/app/invariant_engine.py"
          description: "Invariant monitoring and violation detection"
        - artifact: "hash_sphere_service"
          description: "State change monitoring"
      test_procedures:
        - "Trigger invariant violation - confirm detection and logging"
        - "Review Code Visualizer analysis results"
      compliance_notes: "Multi-layer monitoring via Visualizer, RARA, Hash Sphere"
      
    - id: "CC7.2"
      criterion: "The entity monitors system components for anomalies"
      evidence:
        - artifact: "rara_service/app/kill_switch.py#auto_trigger_conditions"
          description: "Automatic anomaly detection triggers"
        - artifact: "governance/scc/semantic_diff.py"
          description: "Semantic change detection"
      test_procedures:
        - "Verify kill switch triggers on repeated failures"
        - "Confirm semantic diff generation on code changes"
      compliance_notes: "Automatic anomaly detection with kill switch"
      
    - id: "CC7.3"
      criterion: "The entity evaluates security events"
      evidence:
        - artifact: "rara_service/app/governance_engine.py#_log_decision"
          description: "Governance decision logging"
        - artifact: "governance/federation/treaty_validator.py#violation_log"
          description: "Treaty violation logging"
      test_procedures:
        - "Review governance logs for security events"
        - "Verify violation logs contain required fields"
      compliance_notes: "All security events logged with full context"
      
    - id: "CC7.4"
      criterion: "The entity responds to identified security incidents"
      evidence:
        - artifact: "rara_service/app/kill_switch.py"
          description: "Emergency response capability"
        - artifact: "rara_service/app/snapshot_engine.py"
          description: "Rollback capability for incident recovery"
      test_procedures:
        - "Trigger kill switch - confirm system freeze"
        - "Execute rollback - confirm state restoration"
      compliance_notes: "Kill switch and rollback provide incident response"

# ============================================================================
# CC8 - CHANGE MANAGEMENT
# ============================================================================
cc8:
  title: "Change Management"
  status: "COMPLIANT"
  
  criteria:
    - id: "CC8.1"
      criterion: "The entity authorizes, designs, develops, configures, documents, tests, approves, and implements changes"
      evidence:
        - artifact: "governance/scc/semantic_unit_schema.yaml"
          description: "Semantic change control schema"
        - artifact: "governance/scc/semantic_diff.py"
          description: "Automatic semantic diff generation"
        - artifact: "governance/stub_graduation_criteria.yaml"
          description: "Module graduation workflow"
      test_procedures:
        - "Verify semantic diff required for MAJOR changes"
        - "Confirm grammar diff required for capability expansion"
        - "Review graduation workflow documentation"
      compliance_notes: "Semantic change control enforces change management"
      
    - id: "CC8.2"
      criterion: "The entity tests changes before implementation"
      evidence:
        - artifact: "governance/scc/semantic_diff.py#validate_change"
          description: "Change validation before commit"
        - artifact: "rara_service/app/invariant_engine.py"
          description: "Invariant testing before mutation"
      test_procedures:
        - "Attempt change without grammar diff - confirm rejection"
        - "Verify invariant check runs before mutation commit"
      compliance_notes: "Validation is mandatory and automated"
      
    - id: "CC8.3"
      criterion: "The entity implements approved changes"
      evidence:
        - artifact: "rara_service/app/snapshot_engine.py"
          description: "Snapshot before every mutation"
        - artifact: "hash_sphere_service"
          description: "Immutable change record"
      test_procedures:
        - "Verify snapshot created before mutation"
        - "Confirm Hash Sphere records change"
      compliance_notes: "All changes are snapshotted and recorded"

