# ============================================================================
# SEMANTIC UNIT REGISTRY: agent_brain
# ============================================================================
schema_version: "1.0.0"

module:
  path: "agent_engine_service/app/agent_brain.py"
  name: "agent_brain"
  status: "GRADUATED"
  graduated_at: "2025-12-21"
  semantic_version: "1.0.0"

semantic_units:
  - id: agent_brain.think
    capability: agent.cognition.evaluate
    description: "Process input and generate thought with reasoning chain"
    inputs:
      - type: string
        max_size: 10000
        description: "Input to process"
      - type: Dict
        nullable: true
        description: "Context"
    outputs:
      - type: ThoughtProcess
        description: "Thought with reasoning chain"
    side_effects:
      - memory.read
      - memory.write
      - log.write
    forbidden_effects:
      - filesystem.write
      - network.egress
      - agent.spawn
    invariants:
      - "Thought history bounded to 100 entries"
      - "Confidence in range [0.0, 1.0]"
    confidence_required: 0.7

  - id: agent_brain.reset
    capability: agent.cognition.reset
    description: "Reset working memory while preserving long-term memory"
    inputs:
      - type: string
        description: "Agent ID"
    outputs:
      - type: None
    side_effects:
      - memory.write
      - log.write
    forbidden_effects:
      - filesystem.write
      - network.egress
    invariants:
      - "Working memory cleared"
      - "Long-term memory preserved"
    confidence_required: 0.8

change_history:
  - version: "1.0.0"
    date: "2025-12-21"
    change_type: "MAJOR"
    description: "Initial graduation from stub"
    approved_by: "governance_engine"
