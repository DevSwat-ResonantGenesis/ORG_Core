# ============================================================================
# SEMANTIC UNIT REGISTRY: agent_router
# ============================================================================
schema_version: "1.0.0"

module:
  path: "chat_service/app/services/agent_router.py"
  name: "agent_router"
  status: "GRADUATED"
  graduated_at: "2025-12-21"
  semantic_version: "1.0.0"

semantic_units:
  - id: agent_router.route
    capability: agent.routing.route_message
    description: "Route message to appropriate agent based on intent and context"
    inputs:
      - type: string
        max_size: 10000
        description: "User message"
      - type: string
        nullable: true
        description: "Pre-analyzed intent"
      - type: Dict
        nullable: true
        description: "Context information"
      - type: string
        nullable: true
        description: "Preferred agent ID"
    outputs:
      - type: RouteResult
        description: "Routing decision with target agents"
    side_effects:
      - memory.read
      - log.write
    forbidden_effects:
      - filesystem.write
      - network.egress
      - state.mutate
    invariants:
      - "Always returns RouteResult (never None)"
      - "Confidence in range [0.0, 1.0]"
      - "Fallback used when no agents match"
    confidence_required: 0.5

  - id: agent_router.register_agent
    capability: agent.routing.register
    description: "Register an agent with its capabilities"
    inputs:
      - type: string
        description: "Agent ID"
      - type: List[string]
        max_count: 20
        description: "Agent capabilities"
    outputs:
      - type: None
    side_effects:
      - memory.write
      - log.write
    forbidden_effects:
      - filesystem.write
      - network.egress
    invariants:
      - "Agent ID must be unique"
      - "Capabilities list must not be empty"
    confidence_required: 0.7

  - id: agent_router.update_performance
    capability: agent.routing.feedback
    description: "Update agent performance score based on feedback"
    inputs:
      - type: string
        description: "Agent ID"
      - type: float
        description: "Performance score"
    outputs:
      - type: None
    side_effects:
      - memory.write
      - log.write
    forbidden_effects:
      - filesystem.write
      - network.egress
    invariants:
      - "Score clamped to [0.0, 1.0]"
      - "Uses exponential moving average"
    confidence_required: 0.6

change_history:
  - version: "1.0.0"
    date: "2025-12-21"
    change_type: "MAJOR"
    description: "Initial graduation from stub"
    approved_by: "governance_engine"
