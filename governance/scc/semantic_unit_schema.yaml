# ============================================================================
# SEMANTIC UNIT SCHEMA v1.0.0
# ============================================================================
# Machine-readable schema for Semantic Change Control (SCC).
# Every GRADUATED module must declare its Semantic Units using this schema.
#
# STATUS: ACTIVE
# CREATED: 2025-12-21
# GOVERNANCE: Prevents silent capability expansion after graduation.
# ============================================================================

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://resonantgenesis.ai/schemas/semantic-unit/v1"
title: "Semantic Unit Declaration"
description: "Schema for declaring semantic units in graduated modules"

definitions:
  semantic_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    description: "Behavioral version (MAJOR.MINOR.PATCH)"
    
  type_reference:
    type: object
    properties:
      type:
        type: string
        description: "Type name"
      max_size:
        type: integer
        description: "Maximum size in bytes or elements"
      max_count:
        type: integer
        description: "Maximum count for arrays"
      nullable:
        type: boolean
        default: false
    required: ["type"]
    
  side_effect:
    type: string
    enum:
      - "memory.read"
      - "memory.write"
      - "filesystem.read"
      - "filesystem.write"
      - "filesystem.delete"
      - "network.internal"
      - "network.egress"
      - "database.read"
      - "database.write"
      - "agent.spawn"
      - "agent.terminate"
      - "state.mutate"
      - "log.write"
      - "none"

type: object
properties:
  schema_version:
    const: "1.0.0"
    
  module:
    type: object
    properties:
      path:
        type: string
        description: "Relative path to module file"
      name:
        type: string
        description: "Module name"
      status:
        type: string
        enum: ["GRADUATED", "DENIED", "STUB"]
      graduated_at:
        type: string
        format: date
      semantic_version:
        $ref: "#/definitions/semantic_version"
    required: ["path", "name", "status", "semantic_version"]
    
  semantic_units:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          pattern: "^[a-z_]+\\.[a-z_]+$"
          description: "Unique identifier (module.function)"
        capability:
          type: string
          pattern: "^[a-z]+\\.[a-z]+\\.[a-z_]+$"
          description: "Capability reference from grammar"
        description:
          type: string
          maxLength: 200
        inputs:
          type: array
          items:
            $ref: "#/definitions/type_reference"
        outputs:
          type: array
          items:
            $ref: "#/definitions/type_reference"
        side_effects:
          type: array
          items:
            $ref: "#/definitions/side_effect"
        forbidden_effects:
          type: array
          items:
            $ref: "#/definitions/side_effect"
        invariants:
          type: array
          items:
            type: string
          description: "Invariants that must hold"
        confidence_required:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.7
      required: ["id", "capability", "inputs", "outputs", "side_effects", "forbidden_effects"]
      
  change_history:
    type: array
    items:
      type: object
      properties:
        version:
          $ref: "#/definitions/semantic_version"
        date:
          type: string
          format: date
        change_type:
          type: string
          enum: ["MAJOR", "MINOR", "PATCH"]
        description:
          type: string
        approved_by:
          type: string
        grammar_diff_hash:
          type: string
          description: "Hash of capability grammar diff if required"
      required: ["version", "date", "change_type", "description"]

required: ["schema_version", "module", "semantic_units"]

# ============================================================================
# VERSIONING RULES
# ============================================================================
versioning_rules:
  PATCH:
    description: "No semantic change"
    allowed_changes:
      - "Performance optimization"
      - "Refactor with same behavior"
      - "Documentation update"
      - "Logging changes"
    requires_approval: false
    requires_grammar_diff: false
    
  MINOR:
    description: "Bounded semantic expansion"
    allowed_changes:
      - "New optional output field"
      - "Relaxed input constraints"
      - "Additional logging"
    requires_approval: true
    requires_grammar_diff: false
    
  MAJOR:
    description: "New capability or risk"
    allowed_changes:
      - "New side effects"
      - "New capability"
      - "Changed decision criteria"
      - "Expanded blast radius"
    requires_approval: true
    requires_grammar_diff: true
