{{/*
Generic service deployment template - used for all microservices.
Each service gets a Deployment + Service resource.
*/}}

{{- $services := dict
  "auth" (dict "values" .Values.authService "port" 8000)
  "chat" (dict "values" .Values.chatService "port" 8000)
  "llm" (dict "values" .Values.llmService "port" 8000)
  "billing" (dict "values" .Values.billingService "port" 8000)
  "memory" (dict "values" .Values.memoryService "port" 8000)
  "user" (dict "values" .Values.userService "port" 8000)
  "agent-engine" (dict "values" .Values.agentEngine "port" 8000)
  "workflow" (dict "values" .Values.workflowService "port" 8000)
  "code-execution" (dict "values" .Values.codeExecution "port" 8000)
  "code-visualizer" (dict "values" .Values.codeVisualizer "port" 8000)
  "ed" (dict "values" .Values.edService "port" 8000)
  "marketplace" (dict "values" .Values.marketplaceService "port" 8000)
  "notification" (dict "values" .Values.notificationService "port" 8000)
  "storage" (dict "values" .Values.storageService "port" 8000)
-}}

{{- range $name, $svc := $services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rg.fullname" $ }}-{{ $name }}
  labels:
    {{- include "rg.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $svc.values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ printf "%s/%s:%s" $.Values.global.imageRegistry $svc.values.image.repository (default $.Values.global.imageTag (index $svc.values.image "tag" | default "")) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.database.existingSecret }}
                  key: {{ $.Values.global.database.secretKey }}
            - name: DATABASE_URL
              value: {{ include "rg.databaseUrl" $ }}
            - name: REDIS_URL
              value: {{ include "rg.redisUrl" $ }}
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.jwtSecret }}
                  key: jwt-secret
          envFrom:
            - secretRef:
                name: rg-env-secrets
                optional: true
          resources:
            {{- toYaml $svc.values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rg.fullname" $ }}-{{ $name }}
  labels:
    {{- include "rg.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: {{ $svc.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
