apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rg.fullname" . }}-gateway
  labels:
    {{- include "rg.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ printf "%s/%s:%s" .Values.global.imageRegistry .Values.gateway.image.repository (default .Values.global.imageTag .Values.gateway.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: REDIS_URL
              value: {{ include "rg.redisUrl" . }}
            - name: GATEWAY_AUTH_URL
              value: "http://{{ include "rg.fullname" . }}-auth:8000"
            - name: GATEWAY_CHAT_URL
              value: "http://{{ include "rg.fullname" . }}-chat:8000"
            - name: GATEWAY_LLM_URL
              value: "http://{{ include "rg.fullname" . }}-llm:8000"
            - name: GATEWAY_BILLING_URL
              value: "http://{{ include "rg.fullname" . }}-billing:8000"
            - name: GATEWAY_MEMORY_URL
              value: "http://{{ include "rg.fullname" . }}-memory:8000"
            - name: GATEWAY_USER_URL
              value: "http://{{ include "rg.fullname" . }}-user:8000"
            - name: GATEWAY_WORKFLOW_URL
              value: "http://{{ include "rg.fullname" . }}-workflow:8000"
            - name: GATEWAY_AGENT_ENGINE_URL
              value: "http://{{ include "rg.fullname" . }}-agent-engine:8000"
            - name: GATEWAY_MARKETPLACE_URL
              value: "http://{{ include "rg.fullname" . }}-marketplace:8000"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.jwtSecret }}
                  key: jwt-secret
          envFrom:
            - secretRef:
                name: rg-env-secrets
                optional: true
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rg.fullname" . }}-gateway
  labels:
    {{- include "rg.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if .Values.gateway.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "rg.fullname" . }}-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "rg.fullname" . }}-gateway
  minReplicas: {{ .Values.gateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.gateway.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway.autoscaling.targetCPUUtilization }}
{{- end }}
