<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Sphere Memory Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #64c8ff;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #64c8ff;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            background: rgba(20, 25, 50, 0.6);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #64c8ff;
            box-shadow: 0 0 0 3px rgba(100, 200, 255, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }

        button.secondary {
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid rgba(100, 200, 255, 0.3);
        }

        button.danger {
            background: linear-gradient(135deg, #e24a4a 0%, #bd3535 100%);
        }

        .memory-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .memory-item {
            background: rgba(20, 25, 50, 0.4);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .memory-item:hover {
            border-color: #64c8ff;
            background: rgba(20, 25, 50, 0.6);
        }

        .memory-item.selected {
            border-color: #64c8ff;
            background: rgba(100, 200, 255, 0.1);
        }

        .memory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .memory-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #64c8ff;
        }

        .cluster-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cluster-badge.alpha {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .cluster-badge.beta {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .cluster-badge.gamma {
            background: rgba(255, 230, 109, 0.2);
            color: #ffe66d;
            border: 1px solid rgba(255, 230, 109, 0.3);
        }

        .memory-content {
            color: #c0c0c0;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .memory-meta {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: #808080;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .resonance-bar {
            width: 60px;
            height: 4px;
            background: rgba(100, 200, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .resonance-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90e2, #64c8ff);
            transition: width 0.3s ease;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(20, 25, 50, 0.4);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #64c8ff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box input {
            padding-left: 40px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64c8ff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64c8ff;
        }

        .spinner {
            border: 3px solid rgba(100, 200, 255, 0.2);
            border-top: 3px solid #64c8ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.5);
            border-radius: 8px;
            padding: 15px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
        }

        .toast.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .coordinates {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #808080;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌌 Hash Sphere Memory Manager</h1>
            <p class="subtitle">Manage and explore your semantic memory space</p>
        </header>

        <div class="grid">
            <!-- Left Panel - Create/Edit -->
            <div class="panel">
                <h2>
                    <span id="formTitle">📝 Create Memory</span>
                </h2>

                <form id="memoryForm">
                    <input type="hidden" id="memoryId">

                    <div class="form-group">
                        <label>Content</label>
                        <textarea id="content" placeholder="Enter memory content..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Source</label>
                        <input type="text" id="source" placeholder="e.g., chat, manual, import" value="manual">
                    </div>

                    <div class="form-group">
                        <label>Cluster</label>
                        <select id="cluster">
                            <option value="alpha">Alpha (Core Semantics)</option>
                            <option value="beta" selected>Beta (Context)</option>
                            <option value="gamma">Gamma (Style/Intent)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Context (Optional)</label>
                        <input type="text" id="context" placeholder="Additional context...">
                    </div>

                    <div class="actions">
                        <button type="submit" id="submitBtn">
                            <span>💾</span> Save Memory
                        </button>
                        <button type="button" class="secondary" id="clearBtn">
                            <span>🔄</span> Clear
                        </button>
                    </div>
                </form>

                <div class="stats-grid" style="margin-top: 30px;">
                    <div class="stat-card">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">Total Memories</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgResonance">0.00</div>
                        <div class="stat-label">Avg Resonance</div>
                    </div>
                </div>

                <button class="secondary" style="width: 100%; margin-top: 10px;" onclick="window.open('hash_sphere_visualizer.html', '_blank')">
                    <span>🌐</span> Open 3D Visualizer
                </button>
            </div>

            <!-- Right Panel - Memory List -->
            <div class="panel">
                <h2>📚 Memory Library</h2>

                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search memories...">
                </div>

                <div id="memoryList" class="memory-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Loading memories...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let memories = [];
        let selectedMemory = null;

        // Load memories on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadMemories();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('memoryForm').addEventListener('submit', handleSubmit);
            document.getElementById('clearBtn').addEventListener('click', clearForm);
            document.getElementById('searchInput').addEventListener('input', handleSearch);
        }

        async function loadMemories() {
            try {
                const response = await fetch('/memory/retrieve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: '',
                        limit: 1000,
                        use_vector_search: false
                    })
                });

                if (response.ok) {
                    memories = await response.json();
                    renderMemories(memories);
                    updateStats();
                } else {
                    showToast('Failed to load memories', 'error');
                }
            } catch (error) {
                console.error('Error loading memories:', error);
                showToast('Error loading memories', 'error');
            }
        }

        function renderMemories(memoriesToRender) {
            const listEl = document.getElementById('memoryList');
            
            if (memoriesToRender.length === 0) {
                listEl.innerHTML = '<div class="loading">No memories found</div>';
                return;
            }

            listEl.innerHTML = memoriesToRender.map(mem => `
                <div class="memory-item ${selectedMemory?.id === mem.id ? 'selected' : ''}" 
                     onclick="selectMemory('${mem.id}')">
                    <div class="memory-header">
                        <span class="memory-id">${mem.id.substring(0, 8)}...</span>
                        <span class="cluster-badge ${mem.cluster || 'beta'}">${mem.cluster || 'beta'}</span>
                    </div>
                    <div class="memory-content">
                        ${mem.content.substring(0, 150)}${mem.content.length > 150 ? '...' : ''}
                    </div>
                    <div class="memory-meta">
                        <div class="meta-item">
                            <span>📍</span>
                            <span class="coordinates">
                                (${(mem.xyz_x || 0).toFixed(2)}, ${(mem.xyz_y || 0).toFixed(2)}, ${(mem.xyz_z || 0).toFixed(2)})
                            </span>
                        </div>
                        <div class="meta-item">
                            <span>⚡</span>
                            <div class="resonance-bar">
                                <div class="resonance-fill" style="width: ${(mem.resonance_score || 0.5) * 100}%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function selectMemory(id) {
            selectedMemory = memories.find(m => m.id === id);
            if (selectedMemory) {
                document.getElementById('formTitle').textContent = '✏️ Edit Memory';
                document.getElementById('memoryId').value = selectedMemory.id;
                document.getElementById('content').value = selectedMemory.content;
                document.getElementById('source').value = selectedMemory.source || 'manual';
                document.getElementById('cluster').value = selectedMemory.cluster || 'beta';
                document.getElementById('context').value = selectedMemory.context || '';
                document.getElementById('submitBtn').innerHTML = '<span>💾</span> Update Memory';
                
                renderMemories(memories);
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const memoryId = document.getElementById('memoryId').value;
            const content = document.getElementById('content').value;
            const source = document.getElementById('source').value;
            const cluster = document.getElementById('cluster').value;
            const context = document.getElementById('context').value;

            const payload = {
                content,
                source,
                cluster,
                context,
                generate_embedding: true
            };

            try {
                const url = memoryId ? `/memory/${memoryId}` : '/memory/ingest';
                const method = memoryId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showToast(memoryId ? 'Memory updated!' : 'Memory created!', 'success');
                    clearForm();
                    await loadMemories();
                } else {
                    showToast('Failed to save memory', 'error');
                }
            } catch (error) {
                console.error('Error saving memory:', error);
                showToast('Error saving memory', 'error');
            }
        }

        function clearForm() {
            document.getElementById('memoryForm').reset();
            document.getElementById('memoryId').value = '';
            document.getElementById('formTitle').textContent = '📝 Create Memory';
            document.getElementById('submitBtn').innerHTML = '<span>💾</span> Save Memory';
            selectedMemory = null;
            renderMemories(memories);
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const filtered = memories.filter(mem => 
                mem.content.toLowerCase().includes(query) ||
                mem.source.toLowerCase().includes(query) ||
                (mem.cluster || '').toLowerCase().includes(query)
            );
            renderMemories(filtered);
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = memories.length;
            
            const avgRes = memories.reduce((sum, m) => sum + (m.resonance_score || 0.5), 0) / memories.length || 0;
            document.getElementById('avgResonance').textContent = avgRes.toFixed(2);
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.borderColor = type === 'error' ? '#e24a4a' : '#64c8ff';
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
