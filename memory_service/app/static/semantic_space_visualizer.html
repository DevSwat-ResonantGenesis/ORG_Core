<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Memory Space - 3D Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Top Toolbar */
        #toolbar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 24, 0.95);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .toolbar-btn {
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .toolbar-btn:hover {
            background: #252538;
            border-color: #3a3a4a;
        }
        
        .toolbar-btn.active {
            background: #2a2a3a;
            border-color: #3a3a4a;
        }
        
        /* Draggable Panel Base */
        .panel {
            position: fixed;
            background: rgba(17, 17, 24, 0.95);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            z-index: 100;
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .panel.visible {
            display: block;
        }
        
        .panel-header {
            padding: 8px 12px;
            background: #0a0a0f;
            border-bottom: 1px solid #2a2a3a;
            border-radius: 8px 8px 0 0;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        
        .panel-close {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
        }
        
        .panel-close:hover {
            color: #fff;
        }
        
        .panel-content {
            padding: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        /* Control Panel */
        #control-panel {
            top: 60px;
            left: 20px;
            width: 280px;
        }
        
        /* Memory List Panel */
        #memory-panel {
            top: 60px;
            right: 20px;
            width: 320px;
        }
        
        /* Stats Panel */
        #stats-panel {
            bottom: 20px;
            left: 20px;
            width: 200px;
        }
        
        /* Cluster Legend */
        #legend-panel {
            bottom: 20px;
            right: 20px;
            width: 180px;
        }
        
        .control-group {
            margin-bottom: 12px;
        }
        
        .control-group label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #2a2a3a;
            border-radius: 2px;
            outline: none;
        }
        
        input[type="checkbox"] {
            margin-right: 8px;
        }
        
        .cluster-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            font-size: 12px;
        }
        
        .cluster-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }
        
        .alpha-color { background: #ff6b6b; }
        .beta-color { background: #4ecdc4; }
        .gamma-color { background: #ffe66d; }
        
        .memory-item {
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 4px;
            padding: 8px;
            margin: 6px 0;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .memory-item:hover {
            background: #252538;
            border-color: #3a3a4a;
        }
        
        .memory-id {
            color: #666;
            font-family: monospace;
            font-size: 10px;
        }
        
        .memory-content {
            color: #aaa;
            margin: 4px 0;
            line-height: 1.3;
        }
        
        .memory-coords {
            color: #666;
            font-family: monospace;
            font-size: 10px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-size: 11px;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            color: #fff;
            font-weight: 600;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
        }
        
        .spinner {
            border: 3px solid #2a2a3a;
            border-top: 3px solid #888;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        button {
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #252538;
            border-color: #3a3a4a;
        }
        
        .axis-label {
            position: fixed;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- Top Toolbar -->
    <div id="toolbar">
        <button class="toolbar-btn active" onclick="togglePanel('control-panel')">⚙️ Controls</button>
        <button class="toolbar-btn" onclick="togglePanel('memory-panel')">📚 Memories</button>
        <button class="toolbar-btn" onclick="togglePanel('stats-panel')">📊 Stats</button>
        <button class="toolbar-btn" onclick="togglePanel('legend-panel')">🎨 Legend</button>
        <button class="toolbar-btn" onclick="refreshData()">🔄 Refresh</button>
    </div>
    
    <!-- Control Panel -->
    <div id="control-panel" class="panel visible">
        <div class="panel-header">
            <span class="panel-title">⚙️ Controls</span>
            <button class="panel-close" onclick="togglePanel('control-panel')">×</button>
        </div>
        <div class="panel-content">
            <div class="control-group">
                <label>Particle Size</label>
                <input type="range" id="particle-size" min="0.5" max="5" step="0.5" value="2" oninput="updateParticleSize(this.value)">
            </div>
            <div class="control-group">
                <label>Connection Distance</label>
                <input type="range" id="connection-dist" min="0" max="5" step="0.5" value="2" oninput="updateConnectionDistance(this.value)">
            </div>
            <div class="control-group">
                <label>Rotation Speed</label>
                <input type="range" id="rotation-speed" min="0" max="0.01" step="0.001" value="0.002" oninput="updateRotationSpeed(this.value)">
            </div>
            <div class="control-group">
                <label><input type="checkbox" id="show-connections" checked onchange="toggleConnections(this.checked)">Show Connections</label>
                <label><input type="checkbox" id="show-anchors" checked onchange="toggleAnchors(this.checked)">Show Anchors</label>
                <label><input type="checkbox" id="show-axes" checked onchange="toggleAxes(this.checked)">Show Axes</label>
            </div>
            <button onclick="resetCamera()">Reset Camera</button>
        </div>
    </div>
    
    <!-- Memory List Panel -->
    <div id="memory-panel" class="panel">
        <div class="panel-header">
            <span class="panel-title">📚 Memories</span>
            <button class="panel-close" onclick="togglePanel('memory-panel')">×</button>
        </div>
        <div class="panel-content" id="memory-list">
            <div class="loading">
                <div class="spinner"></div>
                Loading memories...
            </div>
        </div>
    </div>
    
    <!-- Stats Panel -->
    <div id="stats-panel" class="panel">
        <div class="panel-header">
            <span class="panel-title">📊 Statistics</span>
            <button class="panel-close" onclick="togglePanel('stats-panel')">×</button>
        </div>
        <div class="panel-content">
            <div class="stat-row">
                <span class="stat-label">Total Memories:</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Alpha (Core):</span>
                <span class="stat-value" id="stat-alpha">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Beta (Context):</span>
                <span class="stat-value" id="stat-beta">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Gamma (Style):</span>
                <span class="stat-value" id="stat-gamma">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Anchored:</span>
                <span class="stat-value" id="stat-anchored">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Avg Resonance:</span>
                <span class="stat-value" id="stat-resonance">0.00</span>
            </div>
        </div>
    </div>
    
    <!-- Legend Panel -->
    <div id="legend-panel" class="panel">
        <div class="panel-header">
            <span class="panel-title">🎨 Cluster Legend</span>
            <button class="panel-close" onclick="togglePanel('legend-panel')">×</button>
        </div>
        <div class="panel-content">
            <div class="cluster-item">
                <div class="cluster-color alpha-color"></div>
                <span>Alpha (Core Semantics)</span>
            </div>
            <div class="cluster-item">
                <div class="cluster-color beta-color"></div>
                <span>Beta (Context)</span>
            </div>
            <div class="cluster-item">
                <div class="cluster-color gamma-color"></div>
                <span>Gamma (Style/Intent)</span>
            </div>
            <div class="cluster-item">
                <div style="width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: 0 0 12px #fff;"></div>
                <span>⚓ Blockchain Anchored</span>
            </div>
        </div>
    </div>
    
    <div class="loading" id="main-loading">
        <div class="spinner"></div>
        <p>Initializing Semantic Space...</p>
    </div>

    <script>
        // Three.js Scene Setup
        let scene, camera, renderer, controls;
        let particles = [];
        let connections = [];
        let anchors = [];
        let memories = [];
        let rotationSpeed = 0.002;
        let particleSize = 2;
        let connectionDistance = 2;
        let showConnections = true;
        let showAnchors = true;
        let showAxes = true;
        
        // Cluster Colors
        const COLORS = {
            alpha: 0xff6b6b,
            beta: 0x4ecdc4,
            gamma: 0xffe66d,
            default: 0x888888
        };
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scene.fog = new THREE.Fog(0x0a0a0f, 10, 50);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 15, 15);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 50;
            
            // Axes
            createAxes();
            
            // Grid
            const gridHelper = new THREE.GridHelper(20, 20, 0x2a2a3a, 0x1a1a2e);
            scene.add(gridHelper);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xffffff, 0.8);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);
            
            // Load data
            loadMemories();
            
            // Animation loop
            animate();
            
            // Window resize
            window.addEventListener('resize', onWindowResize);
            
            // Hide loading
            document.getElementById('main-loading').style.display = 'none';
        }
        
        function createAxes() {
            const axesGroup = new THREE.Group();
            axesGroup.name = 'axes';
            
            // X axis (sin) - Red
            const xGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(10, 0, 0)
            ]);
            const xMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, opacity: 0.5, transparent: true });
            const xAxis = new THREE.Line(xGeometry, xMaterial);
            axesGroup.add(xAxis);
            
            // Y axis (cos) - Green
            const yGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0, 10, 0)
            ]);
            const yMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, opacity: 0.5, transparent: true });
            const yAxis = new THREE.Line(yGeometry, yMaterial);
            axesGroup.add(yAxis);
            
            // Z axis (tan) - Blue
            const zGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0, 0, 10)
            ]);
            const zMaterial = new THREE.LineBasicMaterial({ color: 0x0000ff, opacity: 0.5, transparent: true });
            const zAxis = new THREE.Line(zGeometry, zMaterial);
            axesGroup.add(zAxis);
            
            scene.add(axesGroup);
        }
        
        // Determine API base URL based on whether we're in an iframe
        const getApiBaseUrl = () => {
            try {
                // If we're in an iframe, use the parent's origin
                if (window.parent && window.parent !== window) {
                    return window.parent.location.origin;
                }
            } catch (e) {
                // Cross-origin iframe, fall back to current origin
            }
            return window.location.origin;
        };

        const apiBaseUrl = getApiBaseUrl();
        
        async function loadMemories() {
            try {
                const response = await fetch(`${apiBaseUrl}/api/v1/memory/hash-sphere/anchors?limit=1000`, {
                    method: 'GET',
                    credentials: 'include',
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const toNum = (v, fallback) => {
                        const n = Number(v);
                        return Number.isFinite(n) ? n : fallback;
                    };
                    const normalizeCluster = (name) => {
                        const s = String(name || '').toLowerCase();
                        if (s.includes('alpha')) return 'alpha';
                        if (s.includes('beta')) return 'beta';
                        if (s.includes('gamma')) return 'gamma';
                        return 'beta';
                    };
                    
                    memories = (Array.isArray(data) ? data : []).map(mem => ({
                        id: mem.id,
                        content: mem.context || mem.anchor_text || '',
                        cluster: normalizeCluster(mem.cluster_name),
                        xyz_x: toNum(mem.xyz_x ?? (mem.xyz?.[0]), 0),
                        xyz_y: toNum(mem.xyz_y ?? (mem.xyz?.[1]), 0),
                        xyz_z: toNum(mem.xyz_z ?? (mem.xyz?.[2]), 0),
                        resonance_score: toNum(mem.resonance_score, 0.5),
                        is_anchored: true
                    }));
                    
                    console.log('Loaded memories:', memories.length);
                    createParticles();
                    updateStats();
                    updateMemoryList();
                } else {
                    console.error('Failed to load memories:', response.status);
                    // Create demo data if API fails
                    createDemoData();
                }
            } catch (error) {
                console.error('Error loading memories:', error);
                // Create demo data if API fails
                createDemoData();
            }
        }
        
        function createDemoData() {
            // Create demo memories for visualization
            memories = [];
            for (let i = 0; i < 50; i++) {
                const cluster = ['alpha', 'beta', 'gamma'][Math.floor(Math.random() * 3)];
                memories.push({
                    id: `demo-${i}`,
                    content: `Demo memory ${i}`,
                    cluster: cluster,
                    xyz_x: (Math.random() - 0.5) * 10,
                    xyz_y: (Math.random() - 0.5) * 10,
                    xyz_z: (Math.random() - 0.5) * 10,
                    resonance_score: Math.random(),
                    is_anchored: Math.random() > 0.7
                });
            }
            createParticles();
            updateStats();
            updateMemoryList();
        }
        
        function createParticles() {
            // Clear existing particles
            particles.forEach(p => scene.remove(p));
            connections.forEach(c => scene.remove(c));
            anchors.forEach(a => scene.remove(a));
            particles = [];
            connections = [];
            anchors = [];
            
            // Create particles for each memory
            memories.forEach((memory, index) => {
                const x = memory.xyz_x || 0;
                const y = memory.xyz_y || 0;
                const z = memory.xyz_z || 0;
                
                // Particle geometry
                const geometry = new THREE.SphereGeometry(particleSize * 0.1, 16, 16);
                const color = COLORS[memory.cluster] || COLORS.default;
                const material = new THREE.MeshPhongMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.3,
                    transparent: true,
                    opacity: 0.8
                });
                
                const particle = new THREE.Mesh(geometry, material);
                particle.position.set(x, y, z);
                particle.userData = { memory: memory, index: index };
                scene.add(particle);
                particles.push(particle);
                
                // Anchor indicator
                if (memory.is_anchored) {
                    const anchorGeometry = new THREE.RingGeometry(particleSize * 0.15, particleSize * 0.2, 16);
                    const anchorMaterial = new THREE.MeshBasicMaterial({
                        color: 0xffffff,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.8
                    });
                    const anchor = new THREE.Mesh(anchorGeometry, anchorMaterial);
                    anchor.position.set(x, y, z);
                    anchor.lookAt(camera.position);
                    scene.add(anchor);
                    anchors.push(anchor);
                }
            });
            
            // Create connections based on distance
            if (showConnections) {
                createConnections();
            }
        }
        
        function createConnections() {
            connections.forEach(c => scene.remove(c));
            connections = [];
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dist = particles[i].position.distanceTo(particles[j].position);
                    if (dist < connectionDistance) {
                        const geometry = new THREE.BufferGeometry().setFromPoints([
                            particles[i].position,
                            particles[j].position
                        ]);
                        const material = new THREE.LineBasicMaterial({
                            color: 0x3a3a4a,
                            transparent: true,
                            opacity: 0.2
                        });
                        const line = new THREE.Line(geometry, material);
                        scene.add(line);
                        connections.push(line);
                    }
                }
            }
        }
        
        function updateStats() {
            const total = memories.length;
            const alpha = memories.filter(m => m.cluster === 'alpha').length;
            const beta = memories.filter(m => m.cluster === 'beta').length;
            const gamma = memories.filter(m => m.cluster === 'gamma').length;
            const anchored = memories.filter(m => m.is_anchored).length;
            const avgResonance = memories.reduce((sum, m) => sum + (m.resonance_score || 0), 0) / total || 0;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-alpha').textContent = alpha;
            document.getElementById('stat-beta').textContent = beta;
            document.getElementById('stat-gamma').textContent = gamma;
            document.getElementById('stat-anchored').textContent = anchored;
            document.getElementById('stat-resonance').textContent = avgResonance.toFixed(2);
        }
        
        function updateMemoryList() {
            const listEl = document.getElementById('memory-list');
            listEl.innerHTML = memories.map(m => `
                <div class="memory-item" onclick="focusMemory('${m.id}')">
                    <div class="memory-id">${m.id.substring(0, 8)}...</div>
                    <div class="memory-content">${m.content.substring(0, 60)}${m.content.length > 60 ? '...' : ''}</div>
                    <div class="memory-coords">
                        x:${(m.xyz_x || 0).toFixed(2)} y:${(m.xyz_y || 0).toFixed(2)} z:${(m.xyz_z || 0).toFixed(2)}
                        ${m.is_anchored ? '⚓' : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Auto-rotate
            if (rotationSpeed > 0) {
                scene.rotation.y += rotationSpeed;
            }
            
            // Update anchor rings to face camera
            anchors.forEach(anchor => {
                anchor.lookAt(camera.position);
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // UI Controls
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.classList.toggle('visible');
            
            // Update toolbar button
            const btn = event.target;
            if (btn.classList.contains('toolbar-btn')) {
                btn.classList.toggle('active');
            }
        }
        
        function updateParticleSize(value) {
            particleSize = parseFloat(value);
            createParticles();
        }
        
        function updateConnectionDistance(value) {
            connectionDistance = parseFloat(value);
            if (showConnections) {
                createConnections();
            }
        }
        
        function updateRotationSpeed(value) {
            rotationSpeed = parseFloat(value);
        }
        
        function toggleConnections(checked) {
            showConnections = checked;
            if (checked) {
                createConnections();
            } else {
                connections.forEach(c => scene.remove(c));
                connections = [];
            }
        }
        
        function toggleAnchors(checked) {
            showAnchors = checked;
            anchors.forEach(a => a.visible = checked);
        }
        
        function toggleAxes(checked) {
            showAxes = checked;
            const axesGroup = scene.getObjectByName('axes');
            if (axesGroup) {
                axesGroup.visible = checked;
            }
        }
        
        function resetCamera() {
            camera.position.set(15, 15, 15);
            camera.lookAt(0, 0, 0);
            controls.reset();
        }
        
        function refreshData() {
            loadMemories();
        }
        
        function focusMemory(id) {
            const particle = particles.find(p => p.userData.memory.id === id);
            if (particle) {
                controls.target.copy(particle.position);
                camera.position.set(
                    particle.position.x + 5,
                    particle.position.y + 5,
                    particle.position.z + 5
                );
            }
        }
        
        // Make panels draggable
        document.querySelectorAll('.panel').forEach(panel => {
            const header = panel.querySelector('.panel-header');
            let isDragging = false;
            let currentX, currentY, initialX, initialY;
            
            header.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('panel-close')) return;
                isDragging = true;
                initialX = e.clientX - panel.offsetLeft;
                initialY = e.clientY - panel.offsetTop;
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                panel.style.left = currentX + 'px';
                panel.style.top = currentY + 'px';
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
        });
        
        // Initialize
        init();
    </script>
</body>
</html>
