[databases]
; Auth database - primary for writes, replica for reads
auth_db = host=auth_db_primary port=5432 dbname=auth_db
auth_db_ro = host=auth_db_replica port=5432 dbname=auth_db

; Chat database
chat_db = host=chat_db_primary port=5432 dbname=chat_db
chat_db_ro = host=chat_db_replica port=5432 dbname=chat_db

; Agent database
agent_db = host=agent_db_primary port=5432 dbname=agent_db
agent_db_ro = host=agent_db_replica port=5432 dbname=agent_db

; Memory database
memory_db = host=memory_db_primary port=5432 dbname=memory_db

; Billing database
billing_db = host=billing_db port=5432 dbname=billing_db

; Blockchain database
blockchain_db = host=blockchain_db port=5432 dbname=blockchain_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool settings
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Connection settings
server_reset_query = DISCARD ALL
server_check_query = SELECT 1
server_check_delay = 30
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 3

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = admin
