[pytest]
# Pytest configuration for ResonantGenesis platform testing

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = 
    agent_engine_service/tests
    auth_service/tests
    gateway/tests
    billing_service/tests
    chat_service/tests

# Minimum code coverage percentage
addopts = 
    --verbose
    --strict-markers
    -ra

# Custom markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    security: Security-related tests
    performance: Performance tests
    smoke: Smoke tests for quick validation

# Asyncio mode for async tests
asyncio_mode = auto

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test timeout (prevent hanging tests)
timeout = 300

# Show local variables in tracebacks
showlocals = true

# Disable pytest cacheprovider
cache_dir = .pytest_cache
