    container_name: rg_ast_analysis
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CODE_VISUALIZER_DATABASE_URL: postgresql://doadmin:${DB_PASSWORD:-YOUR_DB_PASSWORD}@resonant-db-do-user-18031534-0.g.db.ondigitalocean.com:25060/defaultdb?sslmode=require
      AST_ANALYSIS_GATEWAY_SECRET: ${CODE_VISUALIZER_GATEWAY_SECRET:-}
      REDIS_URL: redis://shared_redis:6379/0
      LLM_SERVICE_URL: http://llm_service:8000
      MEMORY_SERVICE_URL: http://memory_service:8000
      BILLING_SERVICE_URL: http://billing_service:8000
