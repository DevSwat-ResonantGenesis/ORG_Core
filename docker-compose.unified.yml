      context: /home/deploy/RG_Agent_Engine
      dockerfile: Dockerfile
    container_name: agent_engine_service
    env_file:
    - ./.env.production
    environment:
      DATABASE_URL: ${AGENT_DATABASE_URL}
      REDIS_URL: redis://shared_redis:6379/0
      AGENT_ENGINE_DB_POOL_CLASS: 'null'
      LLM_SERVICE_URL: http://llm_service:8000
      MEMORY_SERVICE_URL: http://memory_service:8000
      AUTH_SERVICE_URL: http://auth_service:8000
      BILLING_SERVICE_URL: http://billing_service:8000
      RARA_SERVICE_URL: http://rg_internal_invarients_sim:8093
      BLOCKCHAIN_SERVICE_URL: http://blockchain_service:8000
      MARKETPLACE_SERVICE_URL: http://marketplace_service:8000
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      CODE_EXECUTION_SERVICE_URL: http://code_execution_service:8002
      SANDBOX_RUNNER_URL: http://sandbox_runner_service:9001
      AGENT_ENGINE_DOCKER_PER_RUN_SANDBOX_ENABLED: 'true'
      AGENT_ENGINE_ENABLE_SCHEDULER: 'true'
      AGENT_ENGINE_ENABLE_AUTONOMOUS_DAEMON: 'true'
      DISCORD_BOT_CLIENT_ID: ${DISCORD_BOT_CLIENT_ID:-}
      PYTHONPATH: /app
    volumes:
    - build_projects:/opt/resonant/user_workspaces
    - /home/deploy/RG_UnifiedLLMClient/src/rg_llm:/app/rg_llm:ro
    depends_on:
    - shared_redis
    - llm_service
    - auth_service
    networks:
    - app-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - python
