      REDIS_URL: redis://shared_redis:6379/0
      AST_ANALYSIS_SERVICE_URL: http://rg_ast_analysis:8000
      HASH_SPHERE_URL: http://rg_users_invarients_sim:8091
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8093/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Users Invariants SIM — standalone, extracted from state_physics_service
  rg_users_invarients_sim:
    build:
