  # ============================================

  blockchain_node:
    build:
      context: /home/deploy/RG_Blockchain_Node
      dockerfile: Dockerfile
    container_name: blockchain_node
    ports:
      - "8081:8081"
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      NODE_HOST: 0.0.0.0
      NODE_PORT: 8081
    volumes:
      - blockchain_node_data:/app/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # DECENTRALIZED TRAINING MESH
  # ============================================

  lighthouse_service:
    build:
      context: /home/deploy/RG_lighthouse
      dockerfile: Dockerfile
    container_name: lighthouse_service
    ports:
      - "127.0.0.1:8700:8000"
    env_file:
      - ./.env.production
    environment:
      RG_ENV: production
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/lighthouse/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  external_blockchain_service:
    build:
      context: /home/deploy/RG_external_blockchain
      dockerfile: Dockerfile
    container_name: external_blockchain_service
    ports:
      - "127.0.0.1:8702:8000"
    env_file:
      - ./.env.production
    environment:
      RG_ENV: production
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  mining_service:
    build:
      context: /home/deploy/RG_Mining
      dockerfile: Dockerfile
    container_name: mining_service
    ports:
      - "127.0.0.1:8701:8000"
    env_file:
      - ./.env.production
    environment:
      RG_ENV: production
      LIGHTHOUSE_URL: http://lighthouse_service:8000
      CRYPTO_SERVICE_URL: http://crypto_service:8000
      EXTERNAL_BLOCKCHAIN_URL: http://external_blockchain_service:8000
    depends_on:
      lighthouse_service:
        condition: service_healthy
      crypto_service:
        condition: service_started
      external_blockchain_service:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/mining/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
