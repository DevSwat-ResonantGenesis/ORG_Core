  code_execution_service:
    build:
      context: /home/deploy/RG_Code_Execution
      dockerfile: Dockerfile
    container_name: code_execution_service
    env_file:
      - ./.env.production
    environment:
      REDIS_URL: redis://shared_redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/rg_code_exec:/tmp/rg_code_exec
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=5)"]
