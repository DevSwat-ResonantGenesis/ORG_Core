version: '3.8'

# ============================================
# UNIFIED PRODUCTION DOCKER COMPOSE
# Single file for ALL services - NO blue/green complexity
# ============================================

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
  build_projects:
  blockchain_node_data:
  v8_data:
  v8_model:

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================
  
  shared_redis:
    image: redis:7-alpine
    container_name: shared_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # GATEWAY (Main Entry Point - Port 8001)
  # ============================================
  
  gateway:
    build:
      context: /home/deploy/RG_Gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8001:8000"
    env_file:
      - ./.env.production
    environment:
      # No DEPLOYMENT_COLOR - use simple container names
      REDIS_URL: redis://shared_redis:6379/0
      GATEWAY_AUTH_URL: http://auth_service:8000
      GATEWAY_CHAT_URL: http://chat_service:8000
      GATEWAY_LLM_URL: http://llm_service:8000
      GATEWAY_BILLING_URL: http://billing_service:8000
      GATEWAY_MEMORY_URL: http://memory_service:8000
      GATEWAY_USER_URL: http://user_service:8000
      GATEWAY_COGNITIVE_URL: http://cognitive_service:8000
      GATEWAY_WORKFLOW_URL: http://workflow_service:8000
      GATEWAY_ML_URL: http://ml_service:8000
      GATEWAY_STORAGE_URL: http://storage_service:8000
      GATEWAY_MARKETPLACE_URL: http://marketplace_service:8000
      GATEWAY_BLOCKCHAIN_URL: http://blockchain_service:8000
      GATEWAY_NOTIFICATION_URL: http://notification_service:8000
      GATEWAY_CRYPTO_URL: http://crypto_service:8000
      GATEWAY_IDE_URL: http://ide_service:8000
      GATEWAY_BUILD_URL: http://build_service:8003
      GATEWAY_CODE_EXECUTION_URL: http://code_execution_service:8002
      GATEWAY_AGENT_ENGINE_URL: http://agent_engine_service:8000
      # GATEWAY_RABBIT_URL: http://rabbit_api_service:8000  # DISABLED
      AST_ANALYSIS_SERVICE_URL: http://rg_ast_analysis:8000
      AGENTIC_CHAT_SERVICE_URL: http://rg_agentic_chat:8000
      GUEST_CHAT_SERVICE_URL: http://rg_public_guest_chat:8010
    depends_on:
      - shared_redis
      - auth_service
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # RABBIT SERVICES (Private Reddit-like Platform)
  # DISABLED — re-enable when needed to free server resources
  # ============================================

  # ============================================
  # CORE SERVICES
  # ============================================

  auth_service:
    build:
      context: /home/deploy/RG_Auth
      dockerfile: Dockerfile
    container_name: auth_service
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      REDIS_URL: redis://shared_redis:6379/0
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  billing_service:
