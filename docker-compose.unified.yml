      CHAT_DB_POOL_CLASS: 'null'
      REDIS_URL: redis://shared_redis:6379/0
      LLM_SERVICE_URL: http://llm_service:8000
      MEMORY_SERVICE_URL: http://memory_service:8000
      AUTH_SERVICE_URL: http://auth_service:8000
      AGENT_ENGINE_URL: http://agent_engine_service:8000
      AGENT_ARCHITECT_URL: http://agent_architect:8000
      BILLING_SERVICE_URL: http://billing_service:8000
      BLOCKCHAIN_SERVICE_URL: http://blockchain_service:8000
      AST_ANALYSIS_SERVICE_URL: http://rg_ast_analysis:8000
      CODE_EXECUTION_SERVICE_URL: http://code_execution_service:8002
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      PYTHONPATH: /app
    depends_on:
    - shared_redis
    - llm_service
    - memory_service
    - auth_service
    networks:
    - app-network
    restart: unless-stopped
    healthcheck:
      test:
