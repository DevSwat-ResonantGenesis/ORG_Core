      timeout: 10s
      retries: 3

  chat_service:
    build:
      context: /home/deploy/RG_Chat
      dockerfile: Dockerfile
    container_name: chat_service
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: ${CHAT_DATABASE_URL}
      REDIS_URL: redis://shared_redis:6379/0
      LLM_SERVICE_URL: http://llm_service:8000
      MEMORY_SERVICE_URL: http://memory_service:8000
      AUTH_SERVICE_URL: http://auth_service:8000
      AST_ANALYSIS_SERVICE_URL: http://rg_ast_analysis:8000
      DEPLOYMENT_COLOR: green
      PYTHONPATH: /app
    volumes:
      - /home/deploy/RG_Platform_Tools:/app/platform_tools:ro
      - /home/deploy/RG_UnifiedLLMClient/src/rg_llm:/app/rg_llm:ro
    networks:
