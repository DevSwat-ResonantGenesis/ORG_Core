      REDIS_URL: redis://shared_redis:6379/0
      AGENT_ENGINE_DB_POOL_CLASS: "null"
      LLM_SERVICE_URL: http://llm_service:8000
      MEMORY_SERVICE_URL: http://memory_service:8000
      RARA_SERVICE_URL: http://rg_internal_invarients_sim:8093
      BLOCKCHAIN_SERVICE_URL: http://blockchain_service:8000
      MARKETPLACE_SERVICE_URL: http://marketplace_service:8000
      SANDBOX_RUNNER_URL: http://sandbox_runner_service:9001
      AGENT_ENGINE_DOCKER_PER_RUN_SANDBOX_ENABLED: "true"
      DISCORD_BOT_CLIENT_ID: ${DISCORD_BOT_CLIENT_ID:-}
      PYTHONPATH: /app
    volumes:
      - build_projects:/opt/resonant/user_workspaces
      - /home/deploy/RG_Platform_Tools:/app/platform_tools:ro
      - /home/deploy/RG_UnifiedLLMClient/src/rg_llm:/app/rg_llm:ro
