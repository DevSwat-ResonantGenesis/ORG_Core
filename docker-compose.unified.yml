    networks:
    - app-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - python3
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8000/mining/health', timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
