name: ✨ Backend Feature Request
description: Request a new backend feature or enhancement
title: "[FEATURE-BACKEND] "
labels: ["enhancement", "backend", "needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## Backend Feature Request
        Propose a new backend feature or enhancement.
        
        **For frontend features, use:** https://github.com/louienemesh/genesis2026_production_frontend/issues/new/choose
        
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - High - Critical for business
        - Medium - Important but not urgent
        - Low - Nice to have
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: Describe the problem or need
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
      placeholder: Describe your proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions did you consider?
      placeholder: List alternative approaches

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is complete?
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] Criteria 3

  - type: checkboxes
    id: implementation
    attributes:
      label: Implementation Considerations
      options:
        - label: Requires database changes
        - label: Requires API changes
        - label: Requires new backend service
        - label: Requires documentation updates
        - label: Requires deployment changes

  - type: checkboxes
    id: ai-agent-safe
    attributes:
      label: AI Agent Assignment
      description: Can an AI agent work on this?
      options:
        - label: Safe for AI agent to implement
        - label: Requires human design review first
        - label: Requires human code review before merge
