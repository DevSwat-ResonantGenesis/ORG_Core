# ============================================
# VERSION.YAML - Contract Version Control
# ============================================
# STATUS: DECLARATIVE TRUTH SOURCE
# AUTHORITY: This file controls contract versioning
# RULE: Update version on any contract change
# ============================================

# Current contract version
version: "1.0.0"

# Version metadata
metadata:
  created: "2025-12-21"
  last_updated: "2025-12-21"
  author: "system"
  
# Semantic versioning rules:
# - MAJOR: Breaking changes (plan restructure, product removal)
# - MINOR: New features (new plan, new product, new feature)
# - PATCH: Fixes (typos, limit adjustments, price tweaks)

# Version history
history:
  - version: "1.0.0"
    date: "2025-12-21"
    changes:
      - "Initial contract creation"
      - "8 products defined"
      - "5 plans defined (free, starter, pro, team, enterprise)"
      - "Pricing matrix established"
      - "30+ features mapped"
    migration: null

# Migration rules
migration:
  # How billing_service should handle version changes
  on_version_change:
    - "Validate new contracts before applying"
    - "Notify affected users of plan changes"
    - "Grandfather existing subscriptions if breaking"
    - "Log migration in audit trail"
  
  # Backward compatibility window
  backward_compatible_versions:
    - "1.0.0"
  
  # Deprecated versions (will be removed)
  deprecated_versions: []

# Consumers of this contract
consumers:
  billing_service:
    reads: ["plans.yaml", "pricing.yaml", "features.yaml"]
    on_update: "restart"
    
  frontend:
    reads: ["pricing_table.json", "plan_features.json"]
    on_update: "rebuild"
    source: "tools/commercial_compiler/output/"
    
  documentation:
    reads: ["products.yaml", "plans.yaml", "features.yaml"]
    on_update: "regenerate"

# Validation rules
validation:
  required_files:
    - "products.yaml"
    - "plans.yaml"
    - "pricing.yaml"
    - "features.yaml"
    - "version.yaml"
  
  ci_check: "python3 tools/commercial_compiler/validate.py contracts/"
